schema_version: 1

context:
  version: "0.2.0"

package:
  name: mrtree-rs
  version: ${{ version }}

source:
  url: https://github.com/apcamargo/mrtree-rs/archive/refs/tags/v${{ version }}.tar.gz
  sha256: be5b121ff6225d4817031f2b2aea32aba752be94a74c3b8669e96843c22bf714

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable

tests:
  - script:
      - mrtree-rs --help

about:
  homepage: https://github.com/apcamargo/mrtree-rs
  repository: https://github.com/apcamargo/mrtree-rs
  documentation: https://github.com/apcamargo/mrtree-rs
  summary: Reconciliation of multi-resolution clustering into a cluster hierarchy
  description: |
    mrtree-rs is a Rust implementation of the MRtree algorithm for reconciling
    clustering labels from multiple resolutions into a consistent cluster
    hierarchy. Relative to the original R implementation, it offers up to
    30-fold speedup.
  license: GPL-3.0-only
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - apcamargo
